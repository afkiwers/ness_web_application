{% extends "base-template.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Zone History</h5>
    <small class="text-muted">Select a zone to view its event history</small>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th style="width:60px">ID</th>
                    <th>Zone</th>
                    <th style="width:100px"></th>
                </tr>
            </thead>
            <tbody>
                {% for zone in zones %}
                <tr>
                    <td class="text-muted align-middle">{{ zone.zone_id }}</td>
                    <td class="align-middle">{{ zone.name }}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary"
                                onclick="openZoneHistory({{ zone.zone_id }}, '{{ zone.name }}')">
                            View
                        </button>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center text-muted py-4">No zones configured.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock content %}
