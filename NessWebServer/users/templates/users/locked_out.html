{% extends "base-template-login.html" %}

{% block header %}
<style>
    body {
        background-color: #0d0d0d;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-card {
        width: 100%;
        max-width: 420px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        text-align: center;
    }
    .auth-icon {
        width: 64px; height: 64px;
        background: linear-gradient(135deg, #dc3545, #a71d2a);
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 1.8rem;
    }
    .auth-card h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .auth-card p { color: #adb5bd; font-size: 0.9rem; }
    .btn-auth {
        display: inline-block; padding: 0.75rem 2.5rem;
        background: linear-gradient(135deg, #ffc107, #e65100);
        border: none; border-radius: 8px; color: #000;
        font-weight: 700; font-size: 0.9375rem; text-decoration: none;
        margin-top: 1.5rem; transition: opacity 0.2s;
    }
    .btn-auth:hover { opacity: 0.9; color: #000; }
</style>
{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-icon">🔒</div>
    <h1>Account Locked</h1>
    <p>Too many failed login attempts. Your account has been temporarily locked. Please try again later.</p>
    <a href="{% url 'two_factor:login' %}" class="btn-auth">Try Again</a>
</div>
{% endblock %}
