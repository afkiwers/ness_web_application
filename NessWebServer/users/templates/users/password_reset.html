{% extends "base-template-login.html" %}
{% load crispy_forms_tags static %}

{% block header %}
<style>
    body {
        background-color: #0d0d0d;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-card {
        width: 100%;
        max-width: 420px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .auth-icon {
        width: 64px; height: 64px;
        background: linear-gradient(135deg, #ffc107, #e65100);
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 1.8rem;
    }
    .auth-card h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
    .auth-card .subtitle { color: #6c757d; font-size: 0.875rem; margin-bottom: 2rem; }
    .auth-card label { color: #adb5bd; font-size: 0.8125rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .auth-card .form-control {
        background: #111; border: 1px solid #333; color: #fff;
        border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.9375rem;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-card .form-control:focus {
        background: #111; border-color: #ffc107;
        box-shadow: 0 0 0 3px rgba(255,193,7,0.15); color: #fff;
    }
    .btn-auth {
        width: 100%; padding: 0.75rem;
        background: linear-gradient(135deg, #ffc107, #e65100);
        border: none; border-radius: 8px; color: #000;
        font-weight: 700; font-size: 0.9375rem; letter-spacing: 0.03em;
        margin-top: 0.5rem; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); color: #000; }
    .btn-auth:active { transform: translateY(0); }
    .back-link { color: #6c757d; font-size: 0.8125rem; }
    .back-link a { color: #ffc107; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-icon">🔑</div>
    <h1 class="text-center">Reset Password</h1>
    <p class="subtitle text-center">Enter your email and we'll send a reset link</p>

    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-auth" type="submit">Send Reset Link</button>
    </form>

    <p class="back-link text-center mt-3">
        Remember it? <a href="{% url 'two_factor:login' %}">Sign in</a>
    </p>
</div>
{% endblock %}
